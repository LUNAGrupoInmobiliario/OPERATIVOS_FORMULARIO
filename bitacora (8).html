<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>📜 Bitácora — Luna GI</title>


<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --blue:#134289;--cyan:#007bbb;--green:#059669;--red:#dc2626;--orange:#d97706;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g900:#0f172a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--g50);min-height:100vh;color:var(--g900)}
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#0f2a5e 0%,var(--blue) 100%)}
.pin-card{background:#fff;border-radius:24px;padding:36px 28px;width:min(340px,100%);box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center}
.pin-logo{width:64px;height:64px;background:var(--blue);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px}
.pin-card h2{font-size:21px;font-weight:700;color:var(--blue);margin-bottom:6px}
.pin-card p{font-size:13px;color:var(--g500);margin-bottom:28px}
#pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--g300);background:transparent;transition:all .2s}
.dot.filled{background:var(--blue);border-color:var(--blue);transform:scale(1.1)}
#numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.key{font-size:24px;font-weight:700;color:var(--g900);background:var(--g50);border:1.5px solid var(--g200);border-radius:14px;padding:17px;cursor:pointer;transition:all .15s;user-select:none}
.key:active{background:var(--blue);color:#fff;border-color:var(--blue)}
.key.del{font-size:18px;color:var(--g500)}
.key.empty{background:transparent;border:none;cursor:default}
#pin-error{font-size:13px;color:var(--red);font-weight:600;min-height:20px;margin-top:4px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
#main-screen{display:none}
.top-bar{background:var(--blue);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:10}
.top-bar h1{font-size:17px;font-weight:700;color:#fff;white-space:nowrap}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.tbtn{font-size:11px;font-weight:700;padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;letter-spacing:.3px;white-space:nowrap}
.tbtn-csv{background:rgba(255,255,255,.2);color:#fff}
.tbtn-clear{background:#dc2626;color:#fff}
.tbtn-out{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.tabs-bar{background:#fff;border-bottom:2px solid var(--g200);display:flex;position:sticky;top:57px;z-index:9}
.tab-btn{flex:1;padding:14px 10px;font-size:13px;font-weight:700;border:none;background:transparent;cursor:pointer;color:var(--g500);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-count{display:inline-block;background:var(--g100);color:var(--g500);font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;margin-left:6px}
.tab-btn.active .tab-count{background:#e0eaff;color:var(--blue)}
.tab-btn.tab-cot.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-btn.tab-cot.active .tab-count{background:#fef3c7;color:var(--orange)}
.content{padding:16px;max-width:800px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;margin-top:12px}
.stat-box{background:#fff;border-radius:14px;padding:16px 10px;text-align:center;border:1.5px solid var(--g200)}
.stat-num{font-size:30px;font-weight:700;color:var(--blue)}
.stat-lbl{font-size:10px;color:var(--g500);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat-box.maq .stat-num{color:#0369a1}
.stat-box.gas .stat-num{color:var(--green)}
.stat-box.cot-tot .stat-num{color:var(--orange)}
.stat-box.cot-hoy .stat-num{color:var(--green)}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.flt{font-size:11px;font-weight:700;padding:7px 16px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;cursor:pointer;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.flt.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--g200);border-radius:12px;font-size:14px;background:#fff;color:var(--g900);outline:none}
.search-wrap input:focus{border-color:var(--cyan)}
.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:15px}
.bit-list{display:flex;flex-direction:column;gap:10px}
.bit-item{background:#fff;border:1.5px solid var(--g200);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.bi-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bi-icon.maq{background:#e0f2fe}
.bi-icon.gas{background:#dcfce7}
.bi-icon.cot{background:#fef3c7}
.bi-body{flex:1;min-width:0}
.bi-nombre{font-weight:700;font-size:15px;color:var(--g900)}
.bi-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase;display:inline-block;margin:4px 0}
.bi-badge.maq{background:#e0f2fe;color:#0369a1}
.bi-badge.gas{background:#dcfce7;color:#15803d}
.bi-badge.cot{background:#fef3c7;color:#92400e}
.bi-meta{font-size:12px;color:var(--g500);margin-top:2px}
.bi-ua{font-size:11px;color:var(--g400);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-state{text-align:center;padding:48px 20px;color:var(--g400)}
.empty-state span{display:block;font-size:42px;margin-bottom:12px}
.loader{display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--g400);font-size:14px}
.spinner{width:22px;height:22px;border:3px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
#confirm-modal.open{display:flex}
.c-box{background:#fff;border-radius:20px;padding:28px 24px;width:min(320px,90vw);text-align:center}
.c-box h3{font-size:17px;font-weight:700;color:var(--g900);margin-bottom:8px}
.c-box p{font-size:13px;color:var(--g500);margin-bottom:22px}
.c-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.c-btns button{padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:700}
.c-no{background:var(--g100);color:var(--g700)}
.c-yes{background:var(--red);color:#fff}
</style>


</head>
<body>

<div id="pin-screen">
  <div class="pin-card">
    <div class="pin-logo">&#x1F512;</div>
    <h2>Bitácora Luna GI</h2>
    <p>Ingresa tu PIN de 4 dígitos</p>
    <div id="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div id="numpad">
      <button class="key" onclick="pk('1')">1</button>
      <button class="key" onclick="pk('2')">2</button>
      <button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button>
      <button class="key" onclick="pk('5')">5</button>
      <button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button>
      <button class="key" onclick="pk('8')">8</button>
      <button class="key" onclick="pk('9')">9</button>
      <div class="key empty"></div>
      <button class="key" onclick="pk('0')">0</button>
      <button class="key del" onclick="pdel()">&#x232B;</button>
    </div>
    <div id="pin-error"></div>
  </div>
</div>

<div id="main-screen">
  <div class="top-bar">
    <h1>&#x1F4CB; Bitácora Luna GI</h1>
    <div class="top-actions">
      <button class="tbtn tbtn-csv" onclick="recargar()">&#x21BB; Actualizar</button>
      <button class="tbtn tbtn-csv" onclick="exportCSV()">&#x2B07; CSV</button>
      <button class="tbtn tbtn-clear" onclick="confirmClear()">&#x1F5D1; Limpiar</button>
      <button class="tbtn tbtn-out" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" id="tab-op" onclick="switchTab('op')">
      &#x1F4CB; Operativos <span class="tab-count" id="tc-op">—</span>
    </button>
    <button class="tab-btn tab-cot" id="tab-cot" onclick="switchTab('cot')">
      &#x1F3E0; Cotizador <span class="tab-count" id="tc-cot">—</span>
    </button>
  </div>

  <div class="content">
    <div class="tab-panel active" id="panel-op">
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" id="s-tot">—</div><div class="stat-lbl">Total</div></div>
        <div class="stat-box maq"><div class="stat-num" id="s-maq">—</div><div class="stat-lbl">Maquinaria</div></div>
        <div class="stat-box gas"><div class="stat-num" id="s-gas">—</div><div class="stat-lbl">Gastos</div></div>
      </div>
      <div class="filters">
        <button class="flt active" onclick="setF('all',this)">Todos</button>
        <button class="flt" onclick="setF('maquinaria',this)">Maquinaria</button>
        <button class="flt" onclick="setF('gastos',this)">Gastos</button>
      </div>
      <div class="search-wrap">
        <span class="si">&#x1F50D;</span>
        <input type="text" id="q-op" placeholder="Buscar por nombre…" oninput="renderOp()">
      </div>
      <div id="list-op" class="bit-list">
        <div class="loader"><div class="spinner"></div> Cargando…</div>
      </div>
    </div>

    <div class="tab-panel" id="panel-cot">
      <div class="stats-grid">
        <div class="stat-box cot-tot"><div class="stat-num" id="s-cot-tot">—</div><div class="stat-lbl">Total Cotizaciones</div></div>
        <div class="stat-box cot-hoy"><div class="stat-num" id="s-cot-hoy">—</div><div class="stat-lbl">Hoy</div></div>
        <div class="stat-box"><div class="stat-num" id="s-cot-sem">—</div><div class="stat-lbl">Esta semana</div></div>
      </div>
      <div class="search-wrap">
        <span class="si">&#x1F50D;</span>
        <input type="text" id="q-cot" placeholder="Buscar por inversionista, asesor o proyecto…" oninput="renderCot()">
      </div>
      <div id="list-cot" class="bit-list">
        <div class="loader"><div class="spinner"></div> Cargando…</div>
      </div>
    </div>
  </div>
</div>

<div id="confirm-modal">
  <div class="c-box">
    <h3 id="confirm-title">Limpiar bitácora</h3>
    <p id="confirm-msg">Se eliminarán permanentemente los registros seleccionados.</p>
    <div class="c-btns">
      <button class="c-no" onclick="closeConfirm()">Cancelar</button>
      <button class="c-yes" onclick="doClear()">Eliminar</button>
    </div>
  </div>
</div>

<script>
const PIN = '0992';
const FB = {
  apiKey:"AIzaSyCJhR10bVifVG50RJ20GPDxkPEw6RpJqCM",
  authDomain:"formulario-operativo-luna-gi.firebaseapp.com",
  projectId:"formulario-operativo-luna-gi",
  storageBucket:"formulario-operativo-luna-gi.firebasestorage.app",
  messagingSenderId:"833936480839",
  appId:"1:833936480389:web:29ca5d4e04da4b30d8f1ec"
};
if(!firebase.apps.length) firebase.initializeApp(FB);
const db = firebase.firestore();

// RECARGAR
function recargar(){
  const btn = document.querySelector('.tbtn[onclick="recargar()"]');
  if(btn){ btn.textContent='⏳ Cargando…'; btn.disabled=true; }
  load().finally(()=>{
    if(btn){ btn.innerHTML='&#x21BB; Actualizar'; btn.disabled=false; }
  });
}

// PIN
let pin='';
function pk(d){
  if(pin.length>=4) return;
  pin+=d;
  document.getElementById('d'+(pin.length-1)).classList.add('filled');
  if(pin.length===4) setTimeout(check,120);
}
function pdel(){
  if(!pin.length) return;
  pin=pin.slice(0,-1);
  document.getElementById('d'+pin.length).classList.remove('filled');
  document.getElementById('pin-error').textContent='';
}
function check(){
  if(pin===PIN){
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    load();
  } else {
    document.getElementById('pin-error').textContent='PIN incorrecto, intenta de nuevo';
    const dots=document.getElementById('pin-dots');
    dots.style.animation='shake .4s ease';
    setTimeout(()=>{dots.style.animation='';pin='';for(let i=0;i<4;i++)document.getElementById('d'+i).classList.remove('filled');document.getElementById('pin-error').textContent='';},700);
  }
}
function logout(){
  document.getElementById('main-screen').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
  pin='';allOp=[];allCot=[];
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
}

// TABS
let activeTab='op';
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// DATA
let allOp=[], allCot=[], filterOp='all';
async function load(){
  try{
    const snap=await db.collection('bitacora').orderBy('ts','desc').limit(500).get();
    const all=snap.docs.map(d=>({id:d.id,...d.data()}));
    allOp=all.filter(r=>r.formulario!=='Cotizador');
    allCot=all.filter(r=>r.formulario==='Cotizador');
    document.getElementById('tc-op').textContent=allOp.length;
    document.getElementById('tc-cot').textContent=allCot.length;
    statsOp(); renderOp();
    statsCot(); renderCot();
  }catch(e){
    ['list-op','list-cot'].forEach(id=>document.getElementById(id).innerHTML='<div class="empty-state"><span>⚠️</span>'+e.message+'</div>');
  }
}

// OPERATIVOS
function statsOp(){
  const maq=allOp.filter(r=>(r.formulario||'').toLowerCase().includes('maquinaria')).length;
  const gas=allOp.filter(r=>(r.formulario||'').toLowerCase().includes('gastos')).length;
  document.getElementById('s-tot').textContent=allOp.length;
  document.getElementById('s-maq').textContent=maq;
  document.getElementById('s-gas').textContent=gas;
}
function setF(f,btn){
  filterOp=f;
  document.querySelectorAll('#panel-op .flt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOp();
}
function renderOp(){
  const q=(document.getElementById('q-op').value||'').toLowerCase();
  let rows=[...allOp];
  if(filterOp==='maquinaria') rows=rows.filter(r=>(r.formulario||'').toLowerCase().includes('maquinaria'));
  if(filterOp==='gastos') rows=rows.filter(r=>(r.formulario||'').toLowerCase().includes('gastos'));
  if(q) rows=rows.filter(r=>(r.nombre||'').toLowerCase().includes(q));
  const el=document.getElementById('list-op');
  if(!rows.length){el.innerHTML='<div class="empty-state"><span>📭</span>Sin registros</div>';return;}
  el.innerHTML='';
  rows.forEach(r=>{
    const isMaq=(r.formulario||'').toLowerCase().includes('maquinaria');
    const div=document.createElement('div');div.className='bit-item';
    div.innerHTML='<div class="bi-icon '+(isMaq?'maq':'gas')+'">'+(isMaq?'🚜':'🧾')+'</div><div class="bi-body"><div class="bi-nombre">'+esc(r.nombre||'—')+'</div><span class="bi-badge '+(isMaq?'maq':'gas')+'">'+esc(r.formulario||'—')+'</span><div class="bi-meta">📅 '+fmtDT(r.fecha)+' &nbsp;·&nbsp; '+devLabel(r.ua||'')+'</div>'+(r.ua?'<div class="bi-ua" title="'+esc(r.ua)+'">'+esc(r.ua)+'</div>':'')+'</div>';
    el.appendChild(div);
  });
}

// COTIZADOR
function statsCot(){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const iniSem=new Date(hoy);iniSem.setDate(hoy.getDate()-hoy.getDay());
  document.getElementById('s-cot-tot').textContent=allCot.length;
  document.getElementById('s-cot-hoy').textContent=allCot.filter(r=>{try{return new Date(r.fecha)>=hoy;}catch{return false;}}).length;
  document.getElementById('s-cot-sem').textContent=allCot.filter(r=>{try{return new Date(r.fecha)>=iniSem;}catch{return false;}}).length;
}
function renderCot(){
  const q=(document.getElementById('q-cot').value||'').toLowerCase();
  let rows=[...allCot];
  if(q) rows=rows.filter(r=>(r.nombre||'').toLowerCase().includes(q)||(r.asesor||'').toLowerCase().includes(q)||(r.proyecto||'').toLowerCase().includes(q));
  const el=document.getElementById('list-cot');
  if(!rows.length){el.innerHTML='<div class="empty-state"><span>📭</span>Sin cotizaciones registradas</div>';return;}
  el.innerHTML='';
  rows.forEach(r=>{
    const div=document.createElement('div');div.className='bit-item';
    div.innerHTML='<div class="bi-icon cot">🏠</div><div class="bi-body"><div class="bi-nombre">'+esc(r.nombre||'—')+'</div><span class="bi-badge cot">Cotizador</span><div class="bi-meta">👤 Asesor: <strong>'+esc(r.asesor||'—')+'</strong></div><div class="bi-meta">🏘 Proyecto: <strong>'+esc(r.proyecto||'—')+'</strong></div><div class="bi-meta">📅 '+fmtDT(r.fecha)+' &nbsp;·&nbsp; '+devLabel(r.ua||'')+'</div>'+(r.ua?'<div class="bi-ua" title="'+esc(r.ua)+'">'+esc(r.ua)+'</div>':'')+'</div>';
    el.appendChild(div);
  });
}

// HELPERS
function devLabel(ua){return ua.includes('iPhone')||ua.includes('iPad')?'📱 iOS':ua.includes('Android')?'📱 Android':'💻 PC';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDT(iso){try{const d=new Date(iso);return d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}catch{return iso||'—';}}

// CSV
function exportCSV(){
  if(activeTab==='op'){
    const rows=allOp.map(r=>[r.nombre||'',r.formulario||'',r.fecha||'',devLabel(r.ua||'').replace(/[📱💻 iOS Android PC]/g,'').trim(),r.ua||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
    dlCSV(['"Nombre","Formulario","Fecha","Dispositivo","UserAgent"',...rows].join('\n'),'Bitacora_Operativos_LunaGI');
  } else {
    const rows=allCot.map(r=>[r.nombre||'',r.asesor||'',r.proyecto||'',r.fecha||'',devLabel(r.ua||'').replace(/[📱💻 iOS Android PC]/g,'').trim(),r.ua||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
    dlCSV(['"Inversionista","Asesor","Proyecto","Fecha","Dispositivo","UserAgent"',...rows].join('\n'),'Bitacora_Cotizador_LunaGI');
  }
}
function dlCSV(csv,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download=name+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// CLEAR
let clearTarget='op';
function confirmClear(){
  clearTarget=activeTab;
  const tab=activeTab==='op'?'Operativos':'Cotizador';
  document.getElementById('confirm-title').textContent='Limpiar '+tab;
  document.getElementById('confirm-msg').textContent='Se eliminarán permanentemente todos los registros de "'+tab+'" de Firebase.';
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');}
async function doClear(){
  closeConfirm();
  const listId=clearTarget==='op'?'list-op':'list-cot';
  document.getElementById(listId).innerHTML='<div class="loader"><div class="spinner"></div> Eliminando…</div>';
  try{
    const toDelete=clearTarget==='op'?allOp:allCot;
    const ids=new Set(toDelete.map(r=>r.id));
    const snap=await db.collection('bitacora').get();
    const batch=db.batch();
    snap.docs.forEach(d=>{if(ids.has(d.id))batch.delete(d.ref);});
    await batch.commit();
    if(clearTarget==='op'){allOp=[];statsOp();renderOp();document.getElementById('tc-op').textContent=0;}
    else{allCot=[];statsCot();renderCot();document.getElementById('tc-cot').textContent=0;}
  }catch(e){alert('Error: '+e.message);}
}
</script>
</body>
</html>
