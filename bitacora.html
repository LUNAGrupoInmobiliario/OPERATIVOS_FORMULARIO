<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Bitácora — Luna GI</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --blue:#134289;--cyan:#007bbb;--green:#059669;--red:#dc2626;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g900:#0f172a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--g50);min-height:100vh;color:var(--g900)}

/* PIN */
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#0f2a5e 0%,var(--blue) 100%)}
.pin-card{background:#fff;border-radius:24px;padding:36px 28px;width:min(340px,100%);box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center}
.pin-logo{width:64px;height:64px;background:var(--blue);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px}
.pin-card h2{font-size:21px;font-weight:700;color:var(--blue);margin-bottom:6px}
.pin-card p{font-size:13px;color:var(--g500);margin-bottom:28px}
#pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--g300);background:transparent;transition:all .2s}
.dot.filled{background:var(--blue);border-color:var(--blue);transform:scale(1.1)}
#numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.key{font-size:24px;font-weight:700;color:var(--g900);background:var(--g50);border:1.5px solid var(--g200);border-radius:14px;padding:17px;cursor:pointer;transition:all .15s;user-select:none}
.key:active{background:var(--blue);color:#fff;border-color:var(--blue)}
.key.del{font-size:18px;color:var(--g500)}
.key.empty{background:transparent;border:none;cursor:default}
#pin-error{font-size:13px;color:var(--red);font-weight:600;min-height:20px;margin-top:4px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

/* MAIN */
#main-screen{display:none}
.top-bar{background:var(--blue);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:10}
.top-bar h1{font-size:17px;font-weight:700;color:#fff;white-space:nowrap}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.tbtn{font-size:11px;font-weight:700;padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;letter-spacing:.3px;white-space:nowrap}
.tbtn-csv{background:rgba(255,255,255,.2);color:#fff}
.tbtn-clear{background:#dc2626;color:#fff}
.tbtn-out{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}

.content{padding:16px;max-width:800px;margin:0 auto}

.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
.stat-box{background:#fff;border-radius:14px;padding:16px 10px;text-align:center;border:1.5px solid var(--g200)}
.stat-num{font-size:30px;font-weight:700;color:var(--blue)}
.stat-lbl{font-size:10px;color:var(--g500);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat-box.maq .stat-num{color:#0369a1}
.stat-box.gas .stat-num{color:var(--green)}
.stat-box.veh .stat-num{color:#a16207}
.stat-box.cot .stat-num{color:#7c3aed}

.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.flt{font-size:11px;font-weight:700;padding:7px 16px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;cursor:pointer;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.flt.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--g200);border-radius:12px;font-size:14px;background:#fff;color:var(--g900);outline:none}
.search-wrap input:focus{border-color:var(--cyan)}
.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:15px}

.bit-list{display:flex;flex-direction:column;gap:10px}
.bit-item{background:#fff;border:1.5px solid var(--g200);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.bi-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bi-icon.maq{background:#e0f2fe}
.bi-icon.gas{background:#dcfce7}
.bi-icon.veh{background:#fef9c3}
.bi-icon.cot{background:#ede9fe}
.bi-body{flex:1;min-width:0}
.bi-nombre{font-weight:700;font-size:15px;color:var(--g900)}
.bi-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase;display:inline-block;margin:4px 0}
.bi-badge.maq{background:#e0f2fe;color:#0369a1}
.bi-badge.gas{background:#dcfce7;color:#15803d}
.bi-badge.veh{background:#fef9c3;color:#a16207}
.bi-badge.cot{background:#ede9fe;color:#7c3aed}
.bi-meta{font-size:12px;color:var(--g500);margin-top:2px}
.bi-ua{font-size:11px;color:var(--g400);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.empty-state{text-align:center;padding:48px 20px;color:var(--g400)}
.empty-state span{display:block;font-size:42px;margin-bottom:12px}
.loader{display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--g400);font-size:14px}
.spinner{width:22px;height:22px;border:3px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Confirm */
#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
#confirm-modal.open{display:flex}
.c-box{background:#fff;border-radius:20px;padding:28px 24px;width:min(320px,90vw);text-align:center}
.c-box h3{font-size:17px;font-weight:700;color:var(--g900);margin-bottom:8px}
.c-box p{font-size:13px;color:var(--g500);margin-bottom:22px}
.c-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.c-btns button{padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:700}
.c-no{background:var(--g100);color:var(--g700)}
.c-yes{background:var(--red);color:#fff}
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-card">
    <div class="pin-logo">🔒</div>
    <h2>Bitácora Luna GI</h2>
    <p>Ingresa tu PIN de 4 dígitos</p>
    <div id="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div id="numpad">
      <button class="key" onclick="pk('1')">1</button>
      <button class="key" onclick="pk('2')">2</button>
      <button class="key" onclick="pk('3')">3</button>
      <button class="key" onclick="pk('4')">4</button>
      <button class="key" onclick="pk('5')">5</button>
      <button class="key" onclick="pk('6')">6</button>
      <button class="key" onclick="pk('7')">7</button>
      <button class="key" onclick="pk('8')">8</button>
      <button class="key" onclick="pk('9')">9</button>
      <div class="key empty"></div>
      <button class="key" onclick="pk('0')">0</button>
      <button class="key del" onclick="pdel()">⌫</button>
    </div>
    <div id="pin-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="top-bar">
    <h1>📋 Bitácora de Uso</h1>
    <div class="top-actions">
      <button class="tbtn tbtn-csv" onclick="exportCSV()">⬇ CSV</button>
      <button class="tbtn tbtn-clear" onclick="confirmClear()">🗑 Limpiar</button>
      <button class="tbtn tbtn-out" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" id="s-tot">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box maq"><div class="stat-num" id="s-maq">—</div><div class="stat-lbl">Maquinaria</div></div>
      <div class="stat-box gas"><div class="stat-num" id="s-gas">—</div><div class="stat-lbl">Gastos</div></div>
      <div class="stat-box veh"><div class="stat-num" id="s-veh">—</div><div class="stat-lbl">Vehículos</div></div>
      <div class="stat-box cot"><div class="stat-num" id="s-cot">—</div><div class="stat-lbl">Cotizador</div></div>
    </div>
    <div class="filters">
      <button class="flt active" onclick="setF('all',this)">Todos</button>
      <button class="flt" onclick="setF('maquinaria',this)">Maquinaria</button>
      <button class="flt" onclick="setF('gastos',this)">Gastos</button>
      <button class="flt" onclick="setF('vehiculos',this)">Vehículos</button>
      <button class="flt" onclick="setF('cotizador',this)">Cotizador</button>
    </div>
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" id="q" placeholder="Buscar por nombre, acción, IP o formulario…" oninput="render()">
    </div>
    <div id="list" class="bit-list">
      <div class="loader"><div class="spinner"></div> Cargando…</div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm-modal">
  <div class="c-box">
    <h3>¿Limpiar bitácora?</h3>
    <p>Se eliminarán permanentemente todos los registros de Firebase.</p>
    <div class="c-btns">
      <button class="c-no" onclick="closeConfirm()">Cancelar</button>
      <button class="c-yes" onclick="doClear()">Eliminar todo</button>
    </div>
  </div>
</div>

<script>
const PIN = '1289'; // ← CAMBIA ANTES DE SUBIR

const FB = {
  apiKey:"AIzaSyCJhR10bVifVG50RJ20GPDxkPEw6RpJqCM",
  authDomain:"formulario-operativo-luna-gi.firebaseapp.com",
  projectId:"formulario-operativo-luna-gi",
  storageBucket:"formulario-operativo-luna-gi.firebasestorage.app",
  messagingSenderId:"833936480389",
  appId:"1:833936480389:web:29ca5d4e04da4b30d8f1ec"
};
if(!firebase.apps.length) firebase.initializeApp(FB);
const db = firebase.firestore();

// ── PIN ───────────────────────────────────────────────────────────
let pin='';
function pk(d){
  if(pin.length>=4) return;
  pin+=d;
  document.getElementById('d'+(pin.length-1)).classList.add('filled');
  if(pin.length===4) setTimeout(check,120);
}
function pdel(){
  if(!pin.length) return;
  pin=pin.slice(0,-1);
  document.getElementById('d'+pin.length).classList.remove('filled');
  document.getElementById('pin-error').textContent='';
}
function check(){
  if(pin===PIN){
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    load();
  } else {
    document.getElementById('pin-error').textContent='PIN incorrecto, intenta de nuevo';
    const dots=document.getElementById('pin-dots');
    dots.style.animation='shake .4s ease';
    setTimeout(()=>{
      dots.style.animation='';
      pin='';
      for(let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
      document.getElementById('pin-error').textContent='';
    },700);
  }
}
function logout(){
  document.getElementById('main-screen').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
  pin=''; all=[];
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
}

// ── DATA ──────────────────────────────────────────────────────────
let all=[], filter='all';

async function load(){
  document.getElementById('list').innerHTML='<div class="loader"><div class="spinner"></div> Cargando registros…</div>';
  try{
    const snap=await db.collection('bitacora').orderBy('ts','desc').limit(500).get();
    all=snap.docs.map(d=>({id:d.id,...d.data()}));
    stats(); render();
  }catch(e){
    document.getElementById('list').innerHTML=`<div class="empty-state"><span>⚠️</span>${e.message}</div>`;
  }
}

function stats(){
  const maq=all.filter(r=>(r.formulario||'').toLowerCase().includes('maquinaria')).length;
  const gas=all.filter(r=>(r.formulario||'').toLowerCase().includes('gastos')).length;
  const veh=all.filter(r=>(r.formulario||'').toLowerCase().includes('veh')).length;
  const cot=all.filter(r=>(r.formulario||'').toLowerCase().includes('cotizador')).length;
  document.getElementById('s-tot').textContent=all.length;
  document.getElementById('s-maq').textContent=maq;
  document.getElementById('s-gas').textContent=gas;
  document.getElementById('s-veh').textContent=veh;
  document.getElementById('s-cot').textContent=cot;
}

function setF(f,btn){
  filter=f;
  document.querySelectorAll('.flt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  let rows=[...all];
  if(filter==='maquinaria') rows=rows.filter(r=>(r.formulario||'').toLowerCase().includes('maquinaria'));
  if(filter==='gastos')     rows=rows.filter(r=>(r.formulario||'').toLowerCase().includes('gastos'));
  if(filter==='vehiculos')  rows=rows.filter(r=>(r.formulario||'').toLowerCase().includes('veh'));
  if(filter==='cotizador')  rows=rows.filter(r=>(r.formulario||'').toLowerCase().includes('cotizador'));
  if(q) rows=rows.filter(r=>
    (r.nombre||'').toLowerCase().includes(q) ||
    (r.accion||'').toLowerCase().includes(q) ||
    (r.ip||'').toLowerCase().includes(q) ||
    (r.formulario||'').toLowerCase().includes(q)
  );

  const el=document.getElementById('list');
  if(!rows.length){el.innerHTML='<div class="empty-state"><span>📭</span>Sin registros</div>';return;}
  el.innerHTML='';
  rows.forEach(r=>{
    const form=(r.formulario||'').toLowerCase();
    const isMaq = form.includes('maquinaria');
    const isVeh = form.includes('veh');
    const isCot = form.includes('cotizador');
    const iconClass = isMaq?'maq':isVeh?'veh':isCot?'cot':'gas';
    const icon      = isMaq?'🚜':isVeh?'🚗':isCot?'🏠':'🧾';
    const badgeClass= iconClass;
    const disp = r.dispositivo || (()=>{
      const ua=r.ua||'';
      return ua.includes('iPhone')||ua.includes('iPad')?'iOS':ua.includes('Android')?'Android':'PC';
    })();
    const dispIcon = disp.includes('iOS')?'📱':disp.includes('Android')?'📱':'💻';
    const div=document.createElement('div');
    div.className='bit-item';
    div.innerHTML=`
      <div class="bi-icon ${iconClass}">${icon}</div>
      <div class="bi-body">
        <div class="bi-nombre">${esc(r.nombre||'—')}</div>
        <span class="bi-badge ${badgeClass}">${esc(r.formulario||'—')}</span>
        ${r.accion?`<div style="font-size:11px;color:#7c3aed;font-weight:600;margin:3px 0">⚡ ${esc(r.accion)}</div>`:''}
        <div class="bi-meta">📅 ${fmtDT(r.fecha)} &nbsp;·&nbsp; ${dispIcon} ${esc(disp)}</div>
        ${r.ip && r.ip!=='—'?`<div class="bi-meta" style="margin-top:2px">🌐 IP: <b>${esc(r.ip)}</b></div>`:''}
      </div>`;
    el.appendChild(div);
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDT(iso){
  try{const d=new Date(iso);return d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}
  catch{return iso||'—';}
}

// ── CSV ───────────────────────────────────────────────────────────
function exportCSV(){
  const rows=all.map(r=>{
    const ua=r.ua||'';
    const disp=r.dispositivo||(ua.includes('iPhone')||ua.includes('iPad')?'iOS':ua.includes('Android')?'Android':'PC');
    return [r.nombre||'',r.formulario||'',r.accion||'',r.fecha||'',disp,r.ip||'—',ua]
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv=['"Nombre","Formulario","Acción","Fecha","Dispositivo","IP","UserAgent"',...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download=`Bitacora_LunaGI_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── CLEAR ─────────────────────────────────────────────────────────
function confirmClear(){document.getElementById('confirm-modal').classList.add('open');}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');}
async function doClear(){
  closeConfirm();
  document.getElementById('list').innerHTML='<div class="loader"><div class="spinner"></div> Eliminando…</div>';
  try{
    const snap=await db.collection('bitacora').get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    all=[];stats();render();
  }catch(e){alert('Error: '+e.message);}
}
</script>
</body>
</html>
